name: ShopFlow CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  AWS_REGION: eu-north-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-north-1.amazonaws.com

jobs:
  test-order-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install flask werkzeug pytest prometheus-client
          pip install --upgrade flask werkzeug
      - name: Run tests
        run: |
          cd services/order-service
          pytest test_app.py -v

  test-inventory-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: |
          cd services/inventory-service
          npm install
      - name: Run tests
        run: |
          cd services/inventory-service
          npm test

  test-notification-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Run tests
        run: |
          cd services/notification-service
          go test ./...

  build-and-push:
    needs: [test-order-service, test-inventory-service, test-notification-service]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push order-service
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/shopflow/order-service:${{ github.sha }} ./services/order-service
          docker push ${{ steps.login-ecr.outputs.registry }}/shopflow/order-service:${{ github.sha }}

      - name: Build and push inventory-service
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/shopflow/inventory-service:${{ github.sha }} ./services/inventory-service
          docker push ${{ steps.login-ecr.outputs.registry }}/shopflow/inventory-service:${{ github.sha }}

      - name: Build and push notification-service
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/shopflow/notification-service:${{ github.sha }} ./services/notification-service
          docker push ${{ steps.login-ecr.outputs.registry }}/shopflow/notification-service:${{ github.sha }}

      - name: Update Helm values with new image tags
        run: |
          sed -i "s/tag: .*/tag: ${{ github.sha }}/" helm/shopflow/values.yaml
          git config --global user.email "ci@shopflow.com"
          git config --global user.name "ShopFlow CI"
          git add helm/shopflow/values.yaml
          git commit -m "update image tags to ${{ github.sha }}"
          git push
