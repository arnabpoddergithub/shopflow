apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
spec:
  replicas: {{ .Values.orderService.replicas }}
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      imagePullSecrets:
      - name: ecr-secret
      containers:
      - name: order-service
        image: "{{ .Values.orderService.image }}:{{ .Values.orderService.tag }}"
        ports:
        - containerPort: {{ .Values.orderService.port }}
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.orderService.port }}
          initialDelaySeconds: 10
          periodSeconds: 5
---
